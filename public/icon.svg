<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Aubergine background with rounded corners (iOS app icon shape, ~22% radius) -->
  <rect width="1024" height="1024" rx="225" ry="225" fill="#2A1F2E"/>

  <!-- Translate the 200x200 design coords up to 1024 canvas, centered -->
  <g transform="translate(112, 112) scale(4)">
    <!-- Bucket handle arching above the skyline -->
    <path d="M 50 95 Q 50 50, 100 50 Q 150 50, 150 95"
          fill="none" stroke="#C8A97E" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Chicago skyline as the bucket body -->
    <path d="M 35 155
             L 35 120
             L 50 120
             L 50 100
             L 60 100
             L 60 120
             L 70 120
             L 70 85
             L 76 85
             L 76 70
             L 80 70
             L 80 55
             L 82 55
             L 82 70
             L 86 70
             L 86 85
             L 92 85
             L 92 100
             L 102 100
             L 102 75
             L 108 75
             L 108 60
             L 118 60
             L 118 75
             L 124 75
             L 124 100
             L 134 100
             L 134 120
             L 150 120
             L 150 95
             L 162 95
             L 162 120
             L 175 120
             L 175 155
             Z"
          fill="none" stroke="#C8A97E" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Lake horizon line -->
    <line x1="25" y1="170" x2="175" y2="170"
          stroke="#C8A97E" stroke-width="3.5"
          stroke-linecap="round"/>
  </g>
</svg>
