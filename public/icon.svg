<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Muted Cubs blue background, iOS-rounded -->
  <rect width="1024" height="1024" rx="225" ry="225" fill="#1A2D52"/>

  <!-- Checklist: scaled from 100x100 design into 1024 canvas -->
  <g transform="translate(112, 112) scale(8)">
    <!-- Row 1: brass-line checkmark + line -->
    <path
      d="M 22 30 L 28 36 L 38 24"
      fill="none"
      stroke="#D6B97D"
      stroke-width="2.8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <line x1="46" y1="30" x2="78" y2="30"
          stroke="#D6B97D" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Row 2: empty bullet + line -->
    <circle cx="30" cy="50" r="2.5" fill="#D6B97D" opacity="0.5"/>
    <line x1="46" y1="50" x2="78" y2="50"
          stroke="#D6B97D" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Row 3: empty bullet + line -->
    <circle cx="30" cy="70" r="2.5" fill="#D6B97D" opacity="0.5"/>
    <line x1="46" y1="70" x2="78" y2="70"
          stroke="#D6B97D" stroke-width="2.8" stroke-linecap="round"/>
  </g>
</svg>
